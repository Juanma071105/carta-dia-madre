<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Día de la Madre</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- FLORES -->
    <div class="flower f1">🌸</div>
    <div class="flower f2">🌹</div>
    <div class="flower f3">🌺</div>
    <div class="flower f4">🌷</div>
    <div class="flower f5">🌼</div>
    <div class="flower f6">💐</div>

    <!-- GLOBOS -->
    <div class="balloon b1"></div>
    <div class="balloon b2"></div>

    <!-- CARTA -->
    <div class="container">

        <div class="card">

            <!-- FRENTE -->
            <div class="front">

                <h1>Feliz Día Mamá 💖</h1>

                <p>Pasa el mouse para abrir ✨</p>

            </div>

            <!-- ATRÁS -->
            <div class="back">

                <div class="photo-frame">

                    <img src="mama.jpg" alt="Foto">

                </div>

                <div class="message" id="typedText"></div>

                <div class="signature">

                    Con mucho amor 💕

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
